<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ArchiMind</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="/style.css" rel="stylesheet" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>ArchiMind</h1>
        <p>Ask your Qdrant collections. Redis remembers the sparks.</p>
      </div>

      <div class="top-actions">
        <button id="healthBtn" type="button">Health</button>
        <button id="collectionBtn" type="button">Collection</button>
        <button id="reviewBtn" type="button">Review Last</button>
        <button id="exportMdBtn" type="button">Export MD</button>
        <button id="exportJsonBtn" type="button">Export JSON</button>
      </div>
    </header>

    <section class="controls">
      <label>
        Collection
        <input id="collectionInput" placeholder="Leave blank for .env default" />
      </label>
      <label>
        Compare collection
        <input id="compareCollectionInput" placeholder="Collection to compare against" />
      </label>
      <label>
        Answer mode
        <select id="modeInput">
          <option value="">Auto</option>
          <option value="normal">Normal</option>
          <option value="skeptical">Skeptical</option>
          <option value="synthesis">Synthesis</option>
          <option value="diagnostic">Diagnostic</option>
        </select>
      </label>
    </section>

    <section class="actions-row">
      <button id="frameworkBtn" type="button">Framework</button>
      <button id="compareBtn" type="button">Compare</button>
    </section>

    <section id="chat" class="chat"></section>

    <form id="chatForm" class="composer">
      <textarea id="messageInput" placeholder="Ask ArchiMind something..." rows="3"></textarea>
      <button type="submit">Ask</button>
    </form>
  </main>

  <script src="/app.js"></script>
</body>
</html>
